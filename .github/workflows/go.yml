name: Go
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Tidy and download dependencies
        run: go mod tidy

      - name: Build
        run: go build -v -o grammarfixer ./...

      - name: 'Upload Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: grammarfixer
          path: grammarfixer
          retention-days: 5
